name: ragBench
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.12.12
  # PyTorch with CUDA
  - pytorch-cuda=12.1
  - torchvision
  - torchaudio
  # Data processing
  - numpy=1.26.4
  - pandas=2.3.3
  - scipy=1.16.3
  # NLP & ML
  - transformers=4.57.1
  - datasets=4.4.1
  - scikit-learn=1.7.2
  - faiss-cpu=1.9.0
  - spacy=3.8.8
  - tiktoken=0.12.0
  # Visualization
  - matplotlib=3.10.8
  - seaborn=0.13.2
  # Utilities
  - networkx=3.5
  - tqdm=4.67.1
  - pyyaml=6.0.3
  - beautifulsoup4=4.14.2
  - requests=2.32.5
  - jsonpatch=1.33
  # Jupyter
  - ipykernel=7.1.0
  - jupyter_client=8.6.3
  # LangChain
  - langchain-core=1.0.4
  - langchain-text-splitters=1.0.0
  # pip packages
  - pip
  - pip:
      # LLM APIs
      - openai==2.8.0
      - anthropic==0.71.0
      # vLLM for local inference
      - vllm==0.13.0
      # Sentence embeddings
      - sentence-transformers==5.1.2
      # Evaluation
      - bert-score==0.3.13
      - nltk==3.9.2
      # PyTorch (pip version)
      - torch==2.9.0
      # Other utilities
      - accelerate==1.12.0
      - bitsandbytes==0.49.0
